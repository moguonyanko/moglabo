<!DOCTYPE html>

<html lang="ja">


<head>
  <meta charset="UTF-8" />
  <title>Web Locks API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../common.css" />
  <link rel="stylesheet" href="main.css" />
  <script type="module" src="main.js"></script>
</head>

<body>

  <header>
    <a href="../../">home</a>
    <h1>Web Locks API</h1>
  </header>

  <main>
    <section class="example get-sample-lock">
      <h2>ロックの取得</h2>
      <button data-event-listener="onGetSampleLock">get lock</button>
      <form class="output">
        <output name="result"></output>
      </form>
    </section>
    <section class="example get-sample-lock-with-cancel">
      <h2>ロックのキャンセル</h2>
      <button data-event-listener="onGetSampleLockWithCancel">get lock</button>
      <form class="output">
        <output name="result"></output>
      </form>
    </section>
    <section class="example race-condition-example">
      <h2>ロック</h2>
      <form class="lock-mode-container">
        <label><input type="radio" name="lockMode" value="exclusive" checked />排他ロック（LOCK1の処理が終わらないと2が表示されない）</label>
        <label><input type="radio" name="lockMode" value="shared" />共有ロック（LOCK1と2が同時に表示される）</label>
      </form>
      <button data-event-listener="onCheckLockType">run</button>
      <form class="output">
        <output name="result"></output>
      </form>
    </section>
    <section class="example check-race-condition">
      <h2>競合</h2>
      <form class="lock-mode-container">
        <label><input type="radio" name="lockMode" value="exclusive" checked />排他ロック</label>
        <label><input type="radio" name="lockMode" value="shared" />共有ロック</label>
      </form>
      <button data-event-listener="onCheckRaceCondition">ロックせず競合させる</button>
      <p>2つのWorkerで10000回ずつインクリメントするので20000が表示されるのが正しい。競合により期待した加算が行われず少ない値が表示されることがある。</p>
      <form class="output">
        <output name="result"></output>
      </form>
    </section>
  </main>

  <footer>
    <h3>参考</h3>
    <ul>
      <li><a href="https://developer.mozilla.org/ja/docs/Web/API/Web_Locks_API">Web Locks API</a></li>
      <li><a href="https://developer.mozilla.org/ja/docs/Web/API/Worker/postMessage">Worker: postMessage() メソッド</a></li>
      <li><a href="https://developer.mozilla.org/ja/docs/Web/JavaScript/Reference/Global_Objects/SharedArrayBuffer">SharedArrayBuffer</a></li>      
    </ul>
  </footer>
</body>


</html>
