<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>Prompt API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../../common.css" />
  <link rel="stylesheet" href="main.css" />
  <script type="module" src="main.js"></script>
</head>

<body>
  <header>
    <a href="../../">home</a>
    <h1>Prompt API</h1>
  </header>

  <main>
    <section class="promptExample">
      <h2>prompt()</h2>
      <my-prompt type="prompt"></my-prompt>
    </section>
    <section class="promptStreamingExample">
      <h2>promptStreaming()</h2>
      <my-prompt type="promptStreaming"></my-prompt>
    </section>
  </main>

  <footer>
    <h3>参考</h3>
    <ul>
      <li><a href="https://developer.chrome.com/docs/ai/prompt-api?hl=ja">Prompt API</a></li>
      <li><a href="https://developer.chrome.com/docs/ai/built-in?hl=ja">組み込みの AI </a></li>
      <li><a href="https://web.dev/articles/ai-chatbot-promptapi?hl=ja">Prompt API を使用してローカルおよびオフライン対応の chatbot
          を作成する</a></li>
      <li><a href="https://github.com/webmachinelearning/prompt-api">Explainer for the Prompt API</a></li>
    </ul>
  </footer>

  <template id="my-prompt">
    <style>
      .output,
      .prompt {
        width: 100%;
        height: 5rem;
        border: solid 1px black;
        overflow-y: scroll;
      }

      .output {
        height: 10rem;
        background-color: whitesmoke;
      }
    </style>
    <textarea class="prompt">末尾再帰最適化について初心者向けに説明してほしい。</textarea>
    <button id="doPrompt">run</button>
    <div class="output"></div>
  </template>
</body>

</html>
